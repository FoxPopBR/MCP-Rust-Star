services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mcp-rust-star-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mcp_knowledge
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mcp_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
